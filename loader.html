<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>loader</title>
  <style>
  *{
  padding: 0;
  margin: 0;
  box-sizing: border-box;
  }
  body{
  height: 100vh;
  background:#e8e8e8;
  display: flex;
  justify-content: center;
  align-items: center;
  }
  .loading{
  --speed-of-animation:0.5s;
  --gap:6px;
  --first-color:#4c86f9;
  --second-color:#49a846;
  --third-color:#f6bb02;
  --fouth-color:#f6bb02;
  --fifth-color:#2196f3;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  width: 100px;
  height: 100px;
  }
  .loading span{
  width: 4px;
  height: 50px;
  background: var(--fifth-color);
  animation: scale 0.9s ease-in-out infinite;
  }
  @keyframes scale{
  0%,40%,100%{
  transform:scaleY(0.05);

  }
  20%{
  transform: scaleY(1);
  }
  }
  .loading span:nth-child(2){
  color: var(--second-color);
  animation-delay: -0.8s;
  }
  .loading span:nth-child(3){
color: var(--third-color);
animation-delay: -0.7s;
}
.loading span:nth-child(4){
color: var(--fouth-color);
animation-delay: -0.6s;
}

.loading span:nth-child(5){
color: var(--fifth-color);
animation-delay: -0.6s;
}


  </style>
</head>

<body>
  <div class="loading">
  <span>
    <!--Tab to edit-->
  </span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  </div>
</body>

</html>
