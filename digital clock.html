<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
<style type="text/css" media="all">
  *{margin:0;
padding:0;
box-sizing:border-box;
}
main{
padding:20px;
display: flex;
align-content: center;
justify-content: center;

}
.card{
padding: 20px;
background: gray;
border-radius: 10px;
color: lightgray;
box-shadow: 0 1px 20px dimgray;
display: flex;
flex-direction:column ;
gap: 10px;
font-size: 15px;
width:min(550px,80%);
}
#time, #date, #day, #ampm {
transition: all 0.4s ease;
}

.animate {
opacity: 0;
transform: translateY(10px);
}

.show {
opacity: 1;
transform: translateY(0);
</style>
</head>

<body>
<main>
  <!--Tab to edit-->
  
  <div class="card">
  <div><p>cl</p>
  <p>digital clock</p>
  <p>12/24 • Dark mode only</p>
  <p>12hr</p>
  <p>24hr</p>
  </div>
  <div>
  <p id="time">00.00.00</p>
  <p id="ampm">am</p>
  <p id="date">january 1,1970</p>
  <p id="day">thursday</p>
  </div>
  <div><p>auto update every seconds</p>
  <p>local time</p>
  </div>
  </div>
  
</main>
<script type="text/javascript">
  const time = document.getElementById("time");
  const day = document.getElementById("day");
  const date = document.getElementById("date");
  
  // Select AM/PM element (you forgot to give it an ID, so we fix it here)
  const ampm = document.querySelectorAll(".card div:nth-child(2) p")[1];
  
  let is24Hour = false; // default = 12hr
  
  function updateClock() {
    const now = new Date();
    
    let hours = now.getHours();
    let minutes = now.getMinutes();
    let seconds = now.getSeconds();
    
    let period = "AM";
    
    // 12hr format logic
    if (!is24Hour) {
      period = hours >= 12 ? "PM" : "AM";
      hours = hours % 12 || 12;
    }
    
    // Add leading zeros
    hours = String(hours).padStart(2, "0");
    minutes = String(minutes).padStart(2, "0");
    seconds = String(seconds).padStart(2, "0");
    
    // Display time
    time.innerText = `${hours}:${minutes}:${seconds}`;
    ampm.innerText = is24Hour ? "" : period;
    
    // Day
    const days = [
      "Sunday", "Monday", "Tuesday", "Wednesday",
      "Thursday", "Friday", "Saturday"
    ];
    day.innerText = days[now.getDay()];
    
    // Date
    const months = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];
    date.innerText = `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  }
  
  // Run every second
  setInterval(updateClock, 1000);
  updateClock();
  
  // Toggle buttons (12hr / 24hr)
  const buttons = document.querySelectorAll(".card div:first-child p");
  
  buttons[3].addEventListener("click", () => {
    is24Hour = false;
  });
  
  buttons[4].addEventListener("click", () => {
    is24Hour = true;
  });
</script>
</body>

</html>
