<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hello</title>
  <style type="text/css" media="all">
 body{
 background: #a855f7;
 display: flex;
 align-items: center;
 justify-content: center;
 height: 100vh;
 overlay: hidden;
 }
h1 span{
 position: relative;
 font-family: "lato" ,sans-serif;
 top: 20px;
 color: white;
 display: inline-block;
 font-size: 5rem;
 text-shadow: 0 1px 0 #b7b7b7,0 2px 0 #b7b7b7, 0 5px 0 #b7b7b7,6px 0 transparent,0 7px 0 transparent, 0 8px 0 transparent 0 9px 0 transparent,0 10px 10px rgb(0,0,0.5)
 ;
 animation: bounce 0.4s ease infinite alternate;
 }
 h1 span:nth-child(2){
 animation-delay: 0.1s;
 }
 h1 span:nth-child(3){
 animation-delay: 0.2s;
 
 }
 h1 span:nth-child(4){
 animation-delay:0.3s ;
 }
 h1 span:nth-child(5){
 animation-delay: 0.4s;
 }
 h1 span:nth-child(6){
 animation-delay: 0.5s;
 }
 @keyframes{
 100%{
 top:-20px;
 text-shadow:0 1px 0 #ccc,0 2px 0 #ccc,0 3px 0 #ccc,0 4px 0 #ccc, 0 5px 0 #ccc,0 6px 0 #ccc,0 7px 0 #ccc,0 8px 0 #ccc,0 9px 0 #ccc,0 60px 30px rgba(0,0,0,0.3);
 }
 }
  </style>
</head>

<body>
  <h1>
  <span>h</span>
  <span>e</span>
  <span>l</span>
  <span>l</span>
  <span>o</span>
  <span>!</span>
  
  </h1>
</body>

</html>
