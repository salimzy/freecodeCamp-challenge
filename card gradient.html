<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style type="text/css" media="all">
    @import url("https://fonts.googleapis.com/css2?family=poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap");
    *{
    font-family: "poppins",sans-serif;
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    }
    
    body{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #0e1538;
    }
    .box{
    width: 300px;
    height: 400px;
    display:flex;
    justify-content: center;
    align-items: center;
    background-color: rgba(0,0,0,0.5);
    border-radius: 15px;
    position: relative;
    overflow: hidden;
    }
    .box h2{
    color: rgb(226, 226, 226);
    text-shadow: 2px 2px black;
    font-size: 40px;
    letter-spacing: 2px;
    z-index: 3;
    color: white;
    
    }
    .box::after{
    position: absolute;
    content: "";
    background: #0e1538;
    inset: 5px;
    border-radius: 16px;
    z-index: 1;
    }
    .box::before{
    z-index: 1;
    position: absolute;
    content: "";
    width: 150px;
    height: 140%;
    filter: blur(20px);
    background: linear-gradient(#00ccff,#df0fff);
    animation: rotate 4s linear infinite;
    }
    @keyframes rotate{
    from{
    transform: rotate(0deg);
    }
    to{
    transform: rotate(360deg);
    }
    }
  </style>
  
</head>

<body>
  <div class="box">
  <h2>css</h2>
  </div>
</body>

</html>
