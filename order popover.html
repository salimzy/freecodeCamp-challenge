<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Success Modal</title>

  <style>
    body{
      font-family: sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#f1f5f9;
    }

    /* Trigger button */
    .order-btn{
      padding:12px 28px;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      background:#0f172a;
      color:#fff;
      border:none;
      border-radius:6px;
    }

    /* Overlay */
    .success-overlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.5);
      display:flex;
      justify-content:center;
      align-items:center;
      opacity:0;
      visibility:hidden;
      transition:0.3s ease;
    }

    .success-overlay.is-active{
      opacity:1;
      visibility:visible;
    }

    /* Card */
    .success-card{
      background:#fff;
      padding:40px;
      border-radius:12px;
      text-align:center;
      max-width:400px;
      transform:translateY(20px) scale(0.95);
      transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    }

    .success-overlay.is-active .success-card{
      transform:translateY(0) scale(1);
    }

    /* SVG */
    .checkmark-svg{
      width:64px;
      height:64px;
      display:block;
      margin:0 auto 20px;
      stroke:#10b981;
      stroke-width:3;
      fill:none;
    }

    .checkmark-circle{
      stroke-dasharray:166;
      stroke-dashoffset:166;
    }

    .checkmark-check{
      stroke-dasharray:48;
      stroke-dashoffset:48;
    }

    /* Animate when active */
    .success-overlay.is-active .checkmark-circle{
      animation:stroke 0.6s forwards;
    }

    .success-overlay.is-active .checkmark-check{
      animation:stroke 0.4s 0.6s forwards;
    }

    /* Text */
    .success-text{
      opacity:0;
      transform:translateY(10px);
    }

    .success-overlay.is-active .success-text{
      animation:fadeUp 0.5s forwards 0.8s;
    }

    .success-text h3{
      margin-bottom:8px;
      color:#0f172a;
    }

    .success-text p{
      color:#64748b;
      margin-bottom:20px;
    }

    /* Close button */
    .close-btn{
      background:#0f172a;
      color:white;
      border:none;
      padding:10px 24px;
      border-radius:6px;
      cursor:pointer;
      opacity:0;
      transition:background 0.2s;
    }

    .success-overlay.is-active .close-btn{
      animation:fadeUp 0.5s forwards 1s;
    }

    .close-btn:hover{
      background:#334155;
    }

    /* Animations */
    @keyframes stroke{
      to{ stroke-dashoffset:0; }
    }

    @keyframes fadeUp{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>

  <!-- Trigger Button -->
  <button id="triggerBtn" class="order-btn">Place Order</button>

  <!-- Modal -->
  <div id="successModal" class="success-overlay">
    <div class="success-card">

      <!-- SVG Check -->
      <svg class="checkmark-svg" viewBox="0 0 52 52">
        <circle class="checkmark-circle" cx="26" cy="26" r="25"/>
        <path class="checkmark-check" d="M14 27l7 7 16-16"/>
      </svg>

      <!-- Text -->
      <div class="success-text">
        <h3>Success!</h3>
        <p>Your order has been placed successfully.</p>
      </div>

      <!-- Close -->
      <button id="closeBtn" class="close-btn">Close</button>

    </div>
  </div>

  <!-- JS (fixed) -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const triggerBtn = document.getElementById("triggerBtn");
      const modal = document.getElementById("successModal");
      const closeBtn = document.getElementById("closeBtn");

      triggerBtn.addEventListener("click", () => {
        modal.classList.add("is-active");
      });

      closeBtn.addEventListener("click", () => {
        modal.classList.remove("is-active");
      });
    });
  </script>

</body>
</html>
