<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
  *{
  
  }
  
  .order-btn{
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 28px;
  gap: 8px;
  font-family:-apple-system ;
  font-size:16px ;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: #000;
  background-color: lightblue;
  border: 1px solid #0f172a;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  
  }
  
  
  .success-overlay{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(15,23,42,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
  z-index: 100;
  }
  .success-card{
  background: #fff;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1),0 8px 10px -6px rgba(0,0,0,0.1);
  text-align: center;
  max-width: 400px;
  transform: translateY(20px) scale(0.95);
  transition: all 0.4s cubic-bezier(0.172,0,885,0.32,1.275);
  
  }
  .success-overlay.is-active{
  opacity: 1;
  visibility: visible;
  }
  .success-overlay.is-active.success-card{
  transform: translateY(0) scale(1);
  }
  .checkmark svg{
  width:64px ;
  height:64px ;
  border:50% ;
  display: block;
  stroke-width:3 ;
  
  }
  </style>
</head>

<body>
  
</body>

</html>
